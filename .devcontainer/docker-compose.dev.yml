services:
  workspace:
    image: python:3.13-slim
    volumes:
      - ..:/workspaces/Szczypior-Discord-Bot:cached
      - /var/run/docker.sock:/var/run/docker.sock  # ← DOCKER CLI
    working_dir: /workspaces/Szczypior-Discord-Bot
    env_file:
      - ../.env
    environment:
      - DATABASE_URL
      - DISCORD_TOKEN
      - DOCKER_HOST=unix:///var/run/docker.sock
    command: sleep infinity
    networks:
      - szczypior-network

  db-service:
    build:
      context: ..
      dockerfile: infrastructure/docker/db-service.Dockerfile
    ports:
      - "8000:80"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../services/db-service/app:/code/app:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
    networks:
      - szczypior-network
    profiles: ["api"]

  discord-bot:
    build:
      context: ..
      dockerfile: infrastructure/docker/discord-bot.Dockerfile
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      API_URL: http://db-service:80
    depends_on:
      - db-service
    networks:
      - szczypior-network
    profiles: ["bot"]

networks:
  szczypior-network:
    driver: bridge
