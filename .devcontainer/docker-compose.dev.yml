services:
  workspace:
    build:
      context: ..
      dockerfile: infrastructure/docker/workspace.Dockerfile
    volumes:
      - ..:/workspaces/Szczypior-Discord-Bot:cached
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspaces/Szczypior-Discord-Bot
    command: sleep infinity
    env_file:
      - ../.env
    environment:
      DB_SERVICE_BASE_URL: http://db-service:80
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - szczypior-network

  db-service:
    build:
      context: ..
      dockerfile: infrastructure/docker/db-service.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../services/db-service:/app/db-service:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
    ports:
      - "8080:80"
    networks:
      - szczypior-network
    profiles: [ "api" ]

  discord-bot:
    build:
      context: ..
      dockerfile: infrastructure/docker/discord-bot.Dockerfile
    env_file:
      - ../.env
    environment:
      API_URL: http://db-service:80
    depends_on:
      - db-service
    networks:
      - szczypior-network
    profiles: [ "bot" ]
  web-dashboard:
    # Dedykowany obraz developerski dla lokalnego Django.
    build:
      context: ..
      dockerfile: infrastructure/docker/web-dashboard-dev.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8001:8001"
    networks:
      - szczypior-network
    profiles: [ "dashboard" ] # osobny profil

  web-frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/web-dashboard-react.Dockerfile
    ports:
      - "8002:80"
    networks:
      - szczypior-network
    profiles: [ "frontend" ]

  web-frontend-dev:
    build:
      context: ..
      dockerfile: infrastructure/docker/web-dashboard-react-dev.Dockerfile
    working_dir: /app
    env_file:
      - ../.env
    command: npm run dev -- --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    networks:
      - szczypior-network
    profiles: [ "frontend-dev" ]

networks:
  szczypior-network:
    external: true
    name: szczypior-dev
