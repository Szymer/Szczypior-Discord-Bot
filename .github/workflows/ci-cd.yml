name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, migration-1.3 ]
  pull_request:
    branches: [ main, develop, migration-1.3 ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -r services/discord-bot-szczypior/requirements.txt
        pip install -r services/db-service/requirements.txt
        pip install -r services/llm-service/requirements.txt

    - name: Run Black (format check)
      run: |
        black --check --diff services/ tests/

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff services/ tests/

    - name: Lint with flake8
      run: |
        flake8 services/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 services/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run pytest
      env:
        PYTHONPATH: services/discord-bot-szczypior:services/db-service:services/llm-service:libs/shared
      run: |
        pytest tests/ -v -m "not integration" --cov=services/discord-bot-szczypior/bot --cov=services/db-service/app --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
